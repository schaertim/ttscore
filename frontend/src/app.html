<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta
			name="description"
			content="Live table tennis scores, ELO ratings, and career stats — follow players, teams, and leagues"
		/>
		<meta name="theme-color" content="#09090b" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="TTScore" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<script>
			// Chrome can fire `beforeinstallprompt` as soon as it parses the manifest link above —
			// often before the Svelte/Vite bundle finishes hydrating. A listener attached later (e.g.
			// in a component's onMount) can miss it entirely, since it's a one-time event with no
			// listeners registered yet. Capturing it here, synchronously, before any framework code
			// runs, guarantees we never miss it — see installPrimer.svelte.ts for the consumer.
			window.__installPromptEvent = null;
			window.addEventListener('beforeinstallprompt', function (e) {
				e.preventDefault();
				window.__installPromptEvent = e;
			});
		</script>
		<script>
			(function () {
				const stored = localStorage.getItem('theme');
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const dark = stored === 'dark' || (!stored && prefersDark);
				if (dark) {
					document.documentElement.classList.add('dark');
				}
				document
					.querySelector('meta[name="theme-color"]')
					.setAttribute('content', dark ? '#09090b' : '#ffffff');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
