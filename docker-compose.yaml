services:
  postgres:
    image: postgres:16
    container_name: ttscore-postgres
    environment:
      POSTGRES_USER: ttscore
      POSTGRES_PASSWORD: ttscore
      POSTGRES_DB: ttscore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: