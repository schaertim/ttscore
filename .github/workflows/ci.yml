name: CI

on:
  pull_request:
  push:
    branches: [staging, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      # Blocking: compile everything + run tests.
      - name: Build & test
        run: ./gradlew test --no-daemon
      # Non-blocking: lint baseline is known-red (pre-existing files). See MEMORY / lint-baseline-red.
      - name: ktlint (non-blocking)
        continue-on-error: true
        run: ./gradlew ktlintCheck --no-daemon

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Blocking: type check + production build.
      - name: Type check
        run: pnpm run check
      - name: Build
        run: pnpm run build
      # Non-blocking: prettier/eslint baseline is known-red.
      - name: Lint (non-blocking)
        continue-on-error: true
        run: pnpm run lint
