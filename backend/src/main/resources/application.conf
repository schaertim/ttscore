ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.ttscore.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/ttscore"
    url = ${?DATABASE_URL}
    user = "ttscore"
    user = ${?DATABASE_USER}
    password = "ttscore"
    password = ${?DATABASE_PASSWORD}
    driver = "org.postgresql.Driver"
}

