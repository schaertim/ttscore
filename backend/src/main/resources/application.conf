jobs {
    enabled = true
    enabled = ${?JOBS_ENABLED}
}

dev {
    # Dev/testing endpoints under /api/v1/dev (e.g. result simulation). MUST stay false in
    # production — enable only on staging/local via DEV_TOOLS_ENABLED=true.
    toolsEnabled = false
    toolsEnabled = ${?DEV_TOOLS_ENABLED}
}

scraper {
    # The live click-tt season. Bump this manually at the season rollover (once the
    # previous season's matches are all finished). Everything else follows from it —
    # discovery, refresh, and the poll all target this season.
    currentSeason = "2026/2027"
    currentSeason = ${?SCRAPER_CURRENT_SEASON}
}

ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.ttscore.ApplicationKt.module ]
    }
}

cors {
    # Comma-separated list of allowed frontend origins (scheme + host + optional port).
    # Override per environment via CORS_ALLOWED_ORIGINS, e.g. "https://ttscore.ch".
    allowedOrigins = "http://localhost:5173"
    allowedOrigins = ${?CORS_ALLOWED_ORIGINS}
}

database {
    url = "jdbc:postgresql://localhost:5432/ttscore"
    url = ${?DATABASE_URL}
    user = "ttscore"
    user = ${?DATABASE_USER}
    password = "ttscore"
    password = ${?DATABASE_PASSWORD}
    driver = "org.postgresql.Driver"
}

vapid {
    # VAPID key pair for Web Push (base64url-encoded P-256 keys).
    # Generate with: node -e "<see scripts/generate-vapid-keys.js>"
    # Override via environment variables in production.
    publicKey  = "BPFdenbMAvCwoI-LKRiot6OQplFrApfzgprH9zZn8qD6OpdYkhKVg64PUXg2jfbCpiJopshgT9tRUqs_2j-kkok"
    publicKey  = ${?VAPID_PUBLIC_KEY}
    privateKey = "upnFHYqH0oIQ2R8TmO-rouq9Iow7AV55mNPfxRVkid8"
    privateKey = ${?VAPID_PRIVATE_KEY}
    subject    = "mailto:support@ttscore.ch"
    subject    = ${?VAPID_SUBJECT}
}

stripe {
    # Stripe secret + webhook signing secret. No safe defaults — billing routes stay
    # disabled (503) until these are provided via environment variables.
    secretKey     = ""
    secretKey     = ${?STRIPE_SECRET_KEY}
    webhookSecret = ""
    webhookSecret = ${?STRIPE_WEBHOOK_SECRET}

    # Recurring Price IDs from the Stripe dashboard (CHF 3/mo and CHF 25/yr).
    priceMonthly = "price_1TpUGUCKjtTwoMSS32Lg0Ep6"
    priceMonthly = ${?STRIPE_PRICE_MONTHLY}
    priceYearly  = "price_1TpUGUCKjtTwoMSStDGyAwsf"
    priceYearly  = ${?STRIPE_PRICE_YEARLY}

    # Frontend base URL for Checkout success/cancel + billing-portal return redirects.
    frontendUrl = "http://localhost:5173"
    frontendUrl = ${?FRONTEND_URL}
}

supabase {
    # Supabase project URL — used as the expected JWT issuer (iss claim).
    url = "https://kxaoxxpggqswqkrokboy.supabase.co"
    url = ${?SUPABASE_URL}

    # EC P-256 public key coordinates for JWT verification (ES256).
    # Find these in: Supabase dashboard → Project Settings → API → JWT Keys
    # → click the current key → Key Details → copy x and y from the JSON.
    jwtKeyX = "ncEK5fBr4qjHX8z_vvM-oqvgYPohTZ36DgHp3c6xp08"
    jwtKeyX = ${?SUPABASE_JWT_KEY_X}
    jwtKeyY = "eDHRkSPefO0fEkXFHmLo7hgKvCSCBMm7RHB__hTsUs4"
    jwtKeyY = ${?SUPABASE_JWT_KEY_Y}
}
